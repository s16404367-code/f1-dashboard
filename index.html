<!DOCTYPE html>

  <div class="top-controls">
    <select id="modeSelect">
      <option value="live">LIVE SESSION</option>
      <option value="historical">HISTORICAL</option>
    </select>

    <input type="number" id="yearInput" value="2025" min="2018" max="2030">

    <button id="loadHistoricalBtn">Load Historical Race</button>
  </div>
</header>

<main>

  <section class="left-panel">
    <h2>Timing Tower</h2>
    <div id="leaderboard"></div>
  </section>

  <section class="center-panel">

    <div class="map-container">
      <h2>Track Map</h2>

      <svg id="trackMap" viewBox="0 0 800 500">
        <path
          d="M100 250 C150 100, 650 100, 700 250 C650 400, 150 400, 100 250"
          class="track-path"
        />
      </svg>
    </div>

    <div class="driver-focus">
      <h2>Driver Focus</h2>
      <div id="driverDetails">
        Select a driver
      </div>
    </div>

  </section>

  <section class="right-panel">

    <div class="widget">
      <h2>Weather</h2>
      <div id="weatherData">Loading...</div>
    </div>

    <div class="widget">
      <h2>Race Control</h2>
      <div id="raceControl">Loading...</div>
    </div>

    <div class="widget">
      <h2>Team Radio</h2>
      <div id="radioFeed"></div>
    </div>

    <div class="widget">
      <h2>Fastest Lap</h2>
      <div id="fastestLap">Loading...</div>
    </div>

  </section>

</main>

<script src="app.js"></script>
</body>
</html>
